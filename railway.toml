# Railway Configuration - Service Specific
[build]
builder = "dockerfile"

[[services]]
name = "api"
source = "backend"
dockerfilePath = "Dockerfile"
healthcheckPath = "/health"

[[services]]
name = "frontend"
source = "frontend"
dockerfilePath = "Dockerfile"
healthcheckPath = "/"


[deploy]
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
